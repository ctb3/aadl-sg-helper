# PR checks. Deliberately credential-free: PRs get no AWS access at all —
# the OIDC trust in both accounts only matches main pushes / v* tags.
name: ci

on:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
      - run: terraform fmt -check -recursive infra/terraform
      - run: |
          terraform -chdir=infra/terraform/bootstrap init -backend=false
          terraform -chdir=infra/terraform/bootstrap validate
      - run: |
          terraform -chdir=infra/terraform/app init -backend=false
          terraform -chdir=infra/terraform/app validate
